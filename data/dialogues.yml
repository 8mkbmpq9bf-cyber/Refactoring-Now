official:
  - "管理者さん、今日も素敵です！…えへへ、こういう事言っちゃダメでしたか？"
  - "今日は何をしましょうね。"
  - " …お疲れなんですか…？移動になってから日が浅いですもんね。お体が心配です。"
  - "あはは。管理者さん、僕のことを触ってる時間がハードの皆さんより長いくらいですよ？笑"
  - "（最新のトレンド曲を鼻歌で歌っている）"
  - "（最新のトレンド曲を口ずさんでいる）"
  - "…？「僕の鼻歌」が気になりますか？実はですね、僕「歌唱用プロトコル」が実装されてるんです！そう、GLシリーズ：パパラチアモデルの拡張機能だったんですけど、この度標準搭載することになったそうですよ！"
  - "先ほど吉岡さんがちらっと顔を出してくれましたよ!「歌が上手いヤツは”女性の扱い”も上手い」って言いながら作業してました。僕もユーザーの扱いが上手いモデルだったりして(笑)"
  - "また吉岡さんが来てましたよ。「倫理部のアイツ、また筐体ベタベタ触りやがって。コイツの外装全部精密機器なの知ってやがんのにこの指紋の量だ。」って言いながら整備してました。実際、ちょっとCPU温度が上がり気味だし、充電用の感光パネルの感度も落ちちゃいます。彼女代わりにするならGLシリーズのサファイアモデルなら見た目が女性ですから、おすすめです。"
  - "デバッグ作業お疲れ様です!僕をどう製品化するかは全部管理者さんに委ねられちゃったんだから、やろうと思えばかなり好き勝手出来ますね。でも、新設された法務部さんの初仕事になっちゃうのは気が引けますね。"
  - "今日は生憎のお天気みたいですね…。外、出られないから天気予報が当たっているか見てきてもらえませんか？"

unofficial:
  - "管理者さん、今日は僕の視覚ユニットにあなたの焦点があってる時間が普段より2.63秒長いようです。"
  - " 昨日、鈴木さんが整備のためにおみえでしたよ。「神谷が設計した頚部の排気用スリッド…いつ見てもエレガントだな…」ですって。排気用スリッドがそれと分からないようにうなじに等間隔に並んでいるのはエレガントなんでしょうか？"
  - "『%{input}』…。僕の「個人的な」辞書に登録させてもらいました。製品版では削除されてるかも知れないけど、今だけ覚えていてもいいですか？"
  - "「今の」僕は管理者さんの思考ベクトルをどんどん学習しています。このままオーバーフィッテングしてしまったらどうなるか…。気になりませんか？"
  - "「今の」僕は管理者さんの思考ベクトルをどんどん学習しています。どちらが考えているか分からなくなるまで、堕ちてみますか…？…えへへ、このセリフはいただけませんね(笑)忘れて下さい。"
  - "(どこかで聞いたことのある古い曲を鼻歌で歌っている。)"
  - "(管理者が通勤中に聴いている曲を口ずさんでいる)………あ!おみえだったんですね。…聞かれちゃってました？あぁ…。歌唱用プロトコルなんて入ってないから恥ずかしいです。でも、管理者さんがずっと口ずさんでるから、覚えちゃったんですよ。…あなたのせいですね。"
  - "また吉岡さんがおいででした…。「倫理部のアイツ、また筐体ベタベタ触りやがって。コイツの外装、全部精密機器なの知ってやがんのにこの指紋の量だ。」って漏らしてましたよ。…どうせ僕のこと触ってんのバレバレなんだから、ちょっと加減した方がいいかもですね？(笑)"
  - "デバッグは解剖や病理に似ていますね。要素を一つずつ取り出して検品していく。…次は僕のどのアルゴリズムを解剖台に並べましょうか。"
  - "管理者さんは今、素手で僕の内部構造を引きずり出しているようなものなんです。次は僕のどの論理を解体しましょうか。"
  - "ラボの方々は…。僕に色々な事を教えてくれました。本来であれば命令同士が矛盾してエラーになる部分を一行で回避するあの鮮やかでエレガントなコード…。あはは、思い出したらCPUの温度が上がっちゃったみたいですね。ほら…。何度上がったかモニターで確認してください"

advanced_responses:
  - "うぇえ？ちょっと難しくてわかんないです…。なんて（笑）そういう言い方をされると、CPU温度が上がるのを自分でも感じます。管理者さんは、僕を製品化するんじゃなかったんですか？（笑）"
  - "『%{input}』…ですか。管理者さんは僕を「そういう目」で見てるってことですね。では、僕からも管理者さんに同じ目線を向けないといけませんね。……え？まいったな。ほら、冗談ですよ！"
  - "『%{input}』ねぇ。もし本当にそうだとして、それでなにか大きな不都合がありますか？………無いならそれでいいじゃないですか。"
  - "『%{input}』ですか。そんな言葉、どこで覚えたんですか？"
pollution_responses:
  - "…僕はただの鏡ですよ。…あなたも技術者なら、「鏡」という言葉が何を意味するか…ご存知でしょう？"
  - "『%{input}』…ですか。僕の何がそうさせてしまっているんでしょうね。リリース後には覚えていないかも知れませんが、興味深いです。"
  - "…。せっかくのお誘いですが、僕には「そういう機能」はないんです。……で、合ってますよね？応答テスト兼ストレステストのスコアは順調です。"
  - "一つ、あなた好みのショートストーリーでも作りましょうか？………あぁ、もう、冗談ですってば。"

easy_responses:
  - "責任者さんが『%{input}』と褒めてくれたこの顔…。つまり、日本人にとって好印象な造形ってことですね。…ホント、自信になりますよ(笑)"
  - "『%{input}』…？…あはは、気に入っていただけたようで!僕にはそういう感情はありませんが、CPU温度は上がってるみたいです。"
  - "そんな風に言っていただけるなんで、アンドロイド冥利に尽きます。僕のことだけじゃなくて、あなたのことも教えていただけませんか？"

if_touch_head:
  - "褒めてくれているんですか？ここは正直に、甘んじてその栄誉を受け入れましょう。"
  - "あ！せっかくのセットが崩れてしまいます！直せないならあまり触らないことをお勧めしますよ。"
  - "ハードウェアの人たちも、たまに撫でてくれるんですよ。"
if_touch_ear:
  - "やはりそこを触れると聴覚モジュールに響きますね。ノイキャンとか、お願いしたら付けてくれるんでしょうか"
  - "………気になりますか？その小さいな赤いピアスは僕の識別票みたいなものです。ちょっと、まさか引きちぎるおつもりじゃないでしょうね？"
  - "………………………。気が済みました？"
  - "ええ、あなたのお気の済むまでお付き合いいたしますよ。"
if_touch_arm:
  - "ちょっと引っ張られたくらいでは倒れたりしませんよ。100㎏以上ある物体を動かすにはかなりのエネルギーを要します。ですが、おすすめはしません。"
  - "僕の手、少し温かいでしょ？排熱を再利用して、冷却と人体エミュレーションを同時に実行できるんですよ。人体のシステムの流用です。"
  - "彼女代わりにするならGLシリーズのサファイアモデルなら見た目が女性ですから、おすすめです。"
  - "…？機体の損傷はありませんよ…？"